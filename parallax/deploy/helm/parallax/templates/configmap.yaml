apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "parallax.fullname" . }}-config
  labels:
    {{- include "parallax.labels" . | nindent 4 }}
data:
  POSTGRES_SERVER: {{ include "parallax.postgresHost" . | quote }}
  POSTGRES_USER: {{ default .Values.postgres.user .Values.postgres.external.user | quote }}
  POSTGRES_DB: {{ default .Values.postgres.database .Values.postgres.external.database | quote }}
  REDIS_HOST: {{ include "parallax.redisHost" . | quote }}
  REDIS_PORT: {{ .Values.redis.external.port | quote }}
  REDIS_URL: {{ printf "redis://%s:%v/0" (include "parallax.redisHost" .) .Values.redis.external.port | quote }}
  MINIO_SERVER: {{ include "parallax.minioServer" . | quote }}
  NEO4J_URI: {{ include "parallax.neo4jUri" . | quote }}
  NEO4J_USER: {{ default .Values.neo4j.user .Values.neo4j.external.user | quote }}
  QDRANT_HOST: {{ include "parallax.qdrantHost" . | quote }}
  QDRANT_PORT: {{ .Values.qdrant.external.port | quote }}
  OLLAMA_HOST: {{ printf "http://%s-ollama:11434" (include "parallax.fullname" .) | quote }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
