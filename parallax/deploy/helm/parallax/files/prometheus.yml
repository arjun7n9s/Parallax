global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/prometheus_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - {{ include "parallax.fullname" . }}-alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: parallax_api
    metrics_path: /metrics
    static_configs:
      - targets:
          - {{ include "parallax.fullname" . }}-api:8000
