[alembic]
script_location = migrations
# This URL is overridden at runtime by migrations/env.py using settings.POSTGRES_URL_SYNC.
# The placeholder ensures alembic never accidentally hits a hardcoded DB.
sqlalchemy.url = OVERRIDDEN_BY_ENV_PY

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
