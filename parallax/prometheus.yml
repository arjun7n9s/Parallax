global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NOTE: host.docker.internal works on Docker Desktop (macOS/Windows).
  # On Linux Docker, replace with the container name or network alias
  # of the API service, e.g. 'parallax_api:8000'.
  - job_name: 'parallax_api'
    static_configs:
      - targets: ['host.docker.internal:8000']
