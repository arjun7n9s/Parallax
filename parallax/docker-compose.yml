services:
  # ============================================================
  # Relational metadata store
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: parallax_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parallax_db_pass}
      POSTGRES_DB: ${POSTGRES_DB:-parallax}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - parallax_net

  # ============================================================
  # Task queue broker
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: parallax_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - parallax_net

  # ============================================================
  # Object storage for APKs, decompiled code, and screenshots
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: parallax_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-parallax_minio_pass}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - parallax_net

  # ============================================================
  # TAIG Knowledge Graph
  # ============================================================
  neo4j:
    image: neo4j:5.20-community
    container_name: parallax_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-parallax_neo4j_pass}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - parallax_net

  # ============================================================
  # Vector DB for code-intent embeddings (semantic APK search)
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: parallax_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - parallax_net

  # ============================================================
  # Local LLM Serving (Ollama)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: parallax_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - parallax_net

  # ============================================================
  # Metrics scraping
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: parallax_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - parallax_net

  # ============================================================
  # Observability Dashboards
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: parallax_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - parallax_net

  # ============================================================
  # Distributed Tracing
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: parallax_jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - parallax_net

volumes:
  pg_data:
  redis_data:
  minio_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  parallax_net:
    driver: bridge
