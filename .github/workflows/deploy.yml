name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to deploy. Defaults to the current commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: read

env:
  IMAGE_REPOSITORY: ghcr.io/arjun7n9s/parallax
  RELEASE_NAME: parallax
  HELM_CHART: parallax/deploy/helm/parallax

jobs:
  staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    if: >-
      ${{
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          vars.STAGING_DEPLOY_ENABLED == 'true'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.target == 'staging'
        )
      }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0
      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG_B64 }}
        run: |
          test -n "$KUBECONFIG_B64"
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
      - name: Helm upgrade staging
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.event.workflow_run.head_sha || github.sha }}
        run: |
          helm upgrade --install "$RELEASE_NAME" "$HELM_CHART" \
            --namespace parallax --create-namespace \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --set secrets.existingSecret=parallax-runtime \
            --wait --timeout 10m

  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0
      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.PRODUCTION_KUBECONFIG_B64 }}
        run: |
          test -n "$KUBECONFIG_B64"
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
      - name: Helm upgrade production
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        run: |
          helm upgrade --install "$RELEASE_NAME" "$HELM_CHART" \
            --namespace parallax --create-namespace \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --set secrets.existingSecret=parallax-runtime \
            --wait --timeout 15m
