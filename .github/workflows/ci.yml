name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# gitleaks-action queries the PR commits API; the default restricted token
# returns 403 without pull-requests read access.
permissions:
  contents: read
  pull-requests: read
  packages: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ruff mypy pydantic pydantic-settings
      - name: Ruff lint
        run: ruff check parallax/
      - name: Ruff format check
        run: ruff format --check parallax/
      - name: Mypy type check
        run: mypy parallax/ --ignore-missing-imports

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans the full PR commit range; a shallow clone makes
          # the base ref unresolvable ("unknown revision")
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install bandit
        run: pip install bandit
      - name: Bandit security scan
        run: bandit -r parallax/ -x parallax/__pycache__ -ll

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/unit/ -v --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: parallax/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: pip install mkdocs
      - name: Build docs
        run: mkdocs build --strict

  migrations:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: parallax_db_pass
          POSTGRES_DB: parallax_migration_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d parallax_migration_smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: parallax_db_pass
      POSTGRES_DB: parallax_migration_smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install migration dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
      - name: Apply migrations
        run: python -m alembic upgrade head
      - name: Show current revision
        run: python -m alembic current
      - name: Roundtrip latest migration on seeded database
        run: |
          python -m alembic downgrade base
          python scripts/verify_migration_roundtrip.py

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and optionally push application image
        uses: docker/build-push-action@v6
        with:
          context: ./parallax
          file: ./parallax/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/arjun7n9s/parallax:${{ github.sha }}
            ghcr.io/arjun7n9s/parallax:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Lint chart
        working-directory: parallax
        run: helm lint deploy/helm/parallax
      - name: Render bundled staging manifest
        working-directory: parallax
        run: helm template parallax deploy/helm/parallax -f deploy/helm/parallax/ci/values-ci.yaml --set image.tag=${{ github.sha }} >/tmp/parallax.yaml
