name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ruff mypy pydantic pydantic-settings
      - name: Ruff lint
        run: ruff check parallax/
      - name: Ruff format check
        run: ruff format --check parallax/
      - name: Mypy type check
        run: mypy parallax/ --ignore-missing-imports

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install bandit
        run: pip install bandit
      - name: Bandit security scan
        run: bandit -r parallax/ -x parallax/__pycache__ -ll

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/unit/ -v --tb=short
