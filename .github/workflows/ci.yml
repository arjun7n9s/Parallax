name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# gitleaks-action queries the PR commits API; the default restricted token
# returns 403 without pull-requests read access.
permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ruff mypy pydantic pydantic-settings
      - name: Ruff lint
        run: ruff check parallax/
      - name: Ruff format check
        run: ruff format --check parallax/
      - name: Mypy type check
        run: mypy parallax/ --ignore-missing-imports

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans the full PR commit range; a shallow clone makes
          # the base ref unresolvable ("unknown revision")
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install bandit
        run: pip install bandit
      - name: Bandit security scan
        run: bandit -r parallax/ -x parallax/__pycache__ -ll

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/unit/ -v --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parallax/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: parallax/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
