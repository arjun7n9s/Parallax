<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PARALLAX — Evidence-First Risk Scoring</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
  .pulse-dot { width: 12px; height: 12px; background: #a78bfa; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
  .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
  .diagram-container { background: rgba(15, 23, 42, 0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; }
  svg { width: 100%; display: block; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
  .card { background: rgba(15, 23, 42, 0.5); border-radius: 0.75rem; border: 1px solid #1e293b; padding: 1rem; }
  .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .card-dot { width: 8px; height: 8px; border-radius: 50%; }
  .card h3 { font-size: 0.8rem; font-weight: 600; }
  .card li { color: #94a3b8; font-size: 0.7rem; margin-bottom: 0.25rem; list-style: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-row">
      <div class="pulse-dot"></div>
      <h1>PARALLAX — Evidence-First Risk Scoring</h1>
    </div>
    <p class="subtitle">Every verdict is traceable to raw evidence — no LLM produces the number</p>
  </div>
  <div class="diagram-container">
    <svg viewBox="0 0 1180 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
        </marker>
        <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
        </marker>
        <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
        </marker>
        <marker id="arr-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
        </marker>
        <marker id="arr-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>

      <!-- =================== ARROWS FIRST =================== -->
      <!-- 7 evidence sources → Risk Scorer combiner (from x=270 to x=380) -->
      <line x1="270" y1="80"  x2="380" y2="240" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <line x1="270" y1="155" x2="380" y2="250" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <line x1="270" y1="230" x2="380" y2="260" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <line x1="270" y1="305" x2="380" y2="270" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <line x1="270" y1="380" x2="380" y2="280" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <line x1="270" y1="455" x2="380" y2="290" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <line x1="270" y1="530" x2="380" y2="300" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-gray)"/>

      <!-- Risk Scorer → Family Floor -->
      <line x1="500" y1="280" x2="580" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <text x="540" y="270" fill="#94a3b8" font-size="9">raw score</text>

      <!-- Family Floor → 3 verdict boxes (with red "force" path) -->
      <line x1="700" y1="240" x2="790" y2="160" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arr-rose)"/>
      <line x1="700" y1="280" x2="790" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <line x1="700" y1="320" x2="790" y2="420" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

      <!-- Force arrow from family floor override back up to MALICIOUS -->
      <path d="M 720 230 Q 740 110 790 130" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
      <text x="745" y="170" fill="#fb7185" font-size="9" font-weight="600">FORCE</text>
      <text x="745" y="184" fill="#fb7185" font-size="8">on known family</text>

      <!-- Evidence Chain box at bottom -->
      <line x1="60" y1="585" x2="1120" y2="585" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,3"/>
      <!-- (orphaned connector removed: Risk Scorer output flows via Family Floor → verdicts) -->

      <!-- =================== COMPONENTS =================== -->

      <!-- 7 Evidence sources (left column, stacked, each 220x60) -->

      <!-- 1. Runtime Hooks (rose) -->
      <rect x="50" y="50" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="50" width="220" height="60" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="65" y="72" fill="white" font-size="11" font-weight="600">Runtime Hooks</text>
      <text x="65" y="88" fill="#94a3b8" font-size="9">Frida observations</text>
      <text x="65" y="101" fill="#94a3b8" font-size="9">SMS · crypto · accessibility</text>
      <rect x="225" y="60" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="74" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">30%</text>

      <!-- 2. Code Intent (amber) -->
      <rect x="50" y="125" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="125" width="220" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="65" y="147" fill="white" font-size="11" font-weight="600">Code Intent</text>
      <text x="65" y="163" fill="#94a3b8" font-size="9">LLM intent classification</text>
      <text x="65" y="176" fill="#94a3b8" font-size="9">Code Interpreter output</text>
      <rect x="225" y="135" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="149" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">20%</text>

      <!-- 3. Visual Phishing (cyan) -->
      <rect x="50" y="200" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="200" width="220" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="65" y="222" fill="white" font-size="11" font-weight="600">Visual Phishing</text>
      <text x="65" y="238" fill="#94a3b8" font-size="9">Screenshot analysis</text>
      <text x="65" y="251" fill="#94a3b8" font-size="9">overlay + brand score</text>
      <rect x="225" y="210" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="224" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">15%</text>

      <!-- 4. ATT&CK Coverage (amber) -->
      <rect x="50" y="275" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="275" width="220" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="65" y="297" fill="white" font-size="11" font-weight="600">ATT&CK Coverage</text>
      <text x="65" y="313" fill="#94a3b8" font-size="9">distinct techniques matched</text>
      <text x="65" y="326" fill="#94a3b8" font-size="9">Intel Correlator output</text>
      <rect x="225" y="285" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="299" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">15%</text>

      <!-- 5. Packer / Obfuscation (rose) -->
      <rect x="50" y="350" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="350" width="220" height="60" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="65" y="372" fill="white" font-size="11" font-weight="600">Packer / Obfuscation</text>
      <text x="65" y="388" fill="#94a3b8" font-size="9">APKiD signatures</text>
      <text x="65" y="401" fill="#94a3b8" font-size="9">DexGuard · R8 · string enc</text>
      <rect x="225" y="360" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="374" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">10%</text>

      <!-- 6. Family Attribution (violet) -->
      <rect x="50" y="425" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="425" width="220" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="65" y="447" fill="white" font-size="11" font-weight="600">Family Attribution</text>
      <text x="65" y="463" fill="#94a3b8" font-size="9">MalwareBazaar hash lookup</text>
      <text x="65" y="476" fill="#94a3b8" font-size="9">RAG over TAIG</text>
      <rect x="225" y="435" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="449" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">5%</text>

      <!-- 7. Manifest Signals (gray) -->
      <rect x="50" y="500" width="220" height="60" rx="6" fill="#0f172a"/>
      <rect x="50" y="500" width="220" height="60" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="65" y="522" fill="white" font-size="11" font-weight="600">Manifest Signals</text>
      <text x="65" y="538" fill="#94a3b8" font-size="9">permissions · certs</text>
      <text x="65" y="551" fill="#94a3b8" font-size="9">exported components</text>
      <rect x="225" y="510" width="38" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="244" y="524" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">5%</text>

      <!-- Risk Scorer combiner (backend) -->
      <rect x="380" y="200" width="200" height="160" rx="8" fill="#0f172a"/>
      <rect x="380" y="200" width="200" height="160" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.8"/>
      <text x="480" y="225" fill="white" font-size="14" font-weight="600" text-anchor="middle">Risk Scorer</text>
      <line x1="395" y1="237" x2="565" y2="237" stroke="#475569" stroke-width="0.5"/>
      <text x="395" y="257" fill="#94a3b8" font-size="10">• weighted sum</text>
      <text x="395" y="274" fill="#94a3b8" font-size="10">• evidence-linked</text>
      <text x="395" y="291" fill="#94a3b8" font-size="10">• deterministic</text>
      <text x="395" y="308" fill="#94a3b8" font-size="10">• no LLM call</text>
      <text x="395" y="325" fill="#94a3b8" font-size="10">• clamps to [0, 100]</text>
      <rect x="395" y="335" width="170" height="20" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="480" y="349" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="700">score: 0.0 → 100.0</text>

      <!-- Family Floor Check (security) -->
      <rect x="580" y="200" width="120" height="160" rx="8" fill="#0f172a"/>
      <rect x="580" y="200" width="120" height="160" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="3,2"/>
      <text x="640" y="225" fill="white" font-size="11" font-weight="600" text-anchor="middle">Family Floor</text>
      <text x="640" y="240" fill="#fb7185" font-size="8" text-anchor="middle">auditable guardrail</text>
      <line x1="595" y1="248" x2="685" y2="248" stroke="#475569" stroke-width="0.5"/>
      <text x="640" y="265" fill="#94a3b8" font-size="9" text-anchor="middle">Known family?</text>
      <text x="640" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">MalwareBazaar</text>
      <text x="640" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">hash hit?</text>
      <text x="640" y="318" fill="#fb7185" font-size="9" text-anchor="middle" font-weight="600">if yes →</text>
      <text x="640" y="332" fill="#fb7185" font-size="9" text-anchor="middle" font-weight="600">force verdict</text>
      <text x="640" y="346" fill="#fb7185" font-size="9" text-anchor="middle" font-weight="600">= MALICIOUS</text>

      <!-- 3 Verdict boxes (right column) -->

      <!-- MALICIOUS / HIGH (rose) -->
      <rect x="790" y="120" width="180" height="80" rx="6" fill="#0f172a"/>
      <rect x="790" y="120" width="180" height="80" rx="6" fill="rgba(136,19,55,0.5)" stroke="#fb7185" stroke-width="1.8"/>
      <text x="880" y="146" fill="white" font-size="14" font-weight="700" text-anchor="middle">MALICIOUS</text>
      <text x="880" y="166" fill="#fb7185" font-size="11" text-anchor="middle" font-weight="600">HIGH · 70+</text>
      <text x="880" y="186" fill="#94a3b8" font-size="9" text-anchor="middle">score ≥ 70 OR known family</text>

      <!-- SUSPICIOUS / MED (amber) -->
      <rect x="790" y="250" width="180" height="80" rx="6" fill="#0f172a"/>
      <rect x="790" y="250" width="180" height="80" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1.8"/>
      <text x="880" y="276" fill="white" font-size="14" font-weight="700" text-anchor="middle">SUSPICIOUS</text>
      <text x="880" y="296" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">MED · 40-69</text>
      <text x="880" y="316" fill="#94a3b8" font-size="9" text-anchor="middle">some signals, no confirm</text>

      <!-- CLEAN / LOW (emerald) -->
      <rect x="790" y="380" width="180" height="80" rx="6" fill="#0f172a"/>
      <rect x="790" y="380" width="180" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.8"/>
      <text x="880" y="406" fill="white" font-size="14" font-weight="700" text-anchor="middle">CLEAN</text>
      <text x="880" y="426" fill="#34d399" font-size="11" text-anchor="middle" font-weight="600">LOW · 0-39</text>
      <text x="880" y="446" fill="#94a3b8" font-size="9" text-anchor="middle">score &lt; 40 + no IOCs</text>

      <!-- Auditability bar at bottom -->
      <rect x="60" y="580" width="1060" height="50" rx="8" fill="#0f172a"/>
      <rect x="60" y="580" width="1060" height="50" rx="8" fill="rgba(76,29,149,0.1)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="80" y="603" fill="#a78bfa" font-size="10" font-weight="600">Auditability guarantee</text>
      <text x="80" y="619" fill="#94a3b8" font-size="9">Every score component links to its raw evidence record (Observation row in PostgreSQL). A regulator can reproduce any verdict from the evidence alone.</text>

      <!-- Far right annotations for score ranges -->
      <rect x="1010" y="120" width="60" height="340" rx="6" fill="rgba(15,23,42,0.5)" stroke="#1e293b" stroke-width="0.5"/>
      <text x="1040" y="140" fill="#94a3b8" font-size="8" text-anchor="middle">score</text>
      <text x="1040" y="153" fill="#94a3b8" font-size="8" text-anchor="middle">range</text>
      <line x1="1020" y1="165" x2="1060" y2="165" stroke="#475569" stroke-width="0.5"/>
      <rect x="1025" y="180" width="30" height="60" fill="rgba(136,19,55,0.3)"/>
      <text x="1040" y="195" fill="#fb7185" font-size="8" text-anchor="middle">70-</text>
      <text x="1040" y="208" fill="#fb7185" font-size="8" text-anchor="middle">100</text>
      <rect x="1025" y="280" width="30" height="60" fill="rgba(120,53,15,0.3)"/>
      <text x="1040" y="305" fill="#fbbf24" font-size="8" text-anchor="middle">40-</text>
      <text x="1040" y="318" fill="#fbbf24" font-size="8" text-anchor="middle">69</text>
      <rect x="1025" y="380" width="30" height="60" fill="rgba(6,78,59,0.3)"/>
      <text x="1040" y="405" fill="#34d399" font-size="8" text-anchor="middle">0-</text>
      <text x="1040" y="418" fill="#34d399" font-size="8" text-anchor="middle">39</text>
    </svg>
  </div>
</div>
</body>
</html>
