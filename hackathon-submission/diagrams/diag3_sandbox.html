<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PARALLAX — Dynamic Analysis Sandbox</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
  .pulse-dot { width: 12px; height: 12px; background: #fb7185; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
  .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
  .diagram-container { background: rgba(15, 23, 42, 0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; }
  svg { width: 100%; display: block; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
  .card { background: rgba(15, 23, 42, 0.5); border-radius: 0.75rem; border: 1px solid #1e293b; padding: 1rem; }
  .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .card-dot { width: 8px; height: 8px; border-radius: 50%; }
  .card h3 { font-size: 0.8rem; font-weight: 600; }
  .card li { color: #94a3b8; font-size: 0.7rem; margin-bottom: 0.25rem; list-style: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-row">
      <div class="pulse-dot"></div>
      <h1>PARALLAX — Dynamic Analysis Sandbox</h1>
    </div>
    <p class="subtitle">Instrumented Android emulator with multi-layer capture</p>
  </div>
  <div class="diagram-container">
    <svg viewBox="0 0 1180 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
        </marker>
        <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
        </marker>
        <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
        </marker>
        <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>

      <!-- =================== ARROWS FIRST =================== -->
      <!-- Hook Planner → Frida Client (downward) -->
      <line x1="190" y1="320" x2="190" y2="285" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>
      <rect x="202" y="290" width="48" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="226" y="301" fill="#fbbf24" font-size="9" text-anchor="middle">hooks</text>

      <!-- Frida Client → Emulator (right, "inject") -->
      <line x1="290" y1="200" x2="410" y2="280" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
      <rect x="318" y="218" width="52" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="344" y="229" fill="#22d3ee" font-size="9" text-anchor="middle">inject</text>

      <!-- Emulator → Frida Client (return, "send()") -->
      <line x1="410" y1="320" x2="290" y2="240" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
      <rect x="318" y="280" width="56" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="346" y="291" fill="#fb7185" font-size="9" text-anchor="middle">send()</text>

      <!-- Emulator → mitmproxy (up) -->
      <line x1="510" y1="220" x2="510" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <rect x="520" y="178" width="130" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="585" y="189" fill="#cbd5e1" font-size="9" text-anchor="middle">all device traffic</text>

      <!-- mitmproxy → Dynamic Worker (right) -->
      <line x1="640" y1="100" x2="790" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <rect x="660" y="155" width="52" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="686" y="166" fill="#cbd5e1" font-size="9" text-anchor="middle">flows</text>

      <!-- Emulator → Dynamic Worker (right, "observations") -->
      <line x1="650" y1="320" x2="790" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <rect x="688" y="278" width="78" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="727" y="289" fill="#cbd5e1" font-size="9" text-anchor="middle">observations</text>

      <!-- DroidBot → Emulator (UI events, diagonal up-right) -->
      <line x1="290" y1="450" x2="430" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <rect x="335" y="397" width="64" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#475569" stroke-width="0.5"/>
      <text x="367" y="408" fill="#cbd5e1" font-size="9" text-anchor="middle">UI events</text>

      <!-- Dynamic Worker → Observation Store (down) -->
      <line x1="870" y1="290" x2="870" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

      <!-- Observation Store → MinIO (down) -->
      <line x1="870" y1="450" x2="870" y2="510" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

      <!-- =================== COMPONENTS =================== -->

      <!-- mitmproxy (security) -->
      <rect x="430" y="40" width="200" height="115" rx="6" fill="#0f172a"/>
      <rect x="430" y="40" width="200" height="115" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="530" y="63" fill="white" font-size="12" font-weight="600" text-anchor="middle">mitmproxy</text>
      <text x="530" y="83" fill="#94a3b8" font-size="9" text-anchor="middle">TLS interception</text>
      <text x="530" y="97" fill="#94a3b8" font-size="9" text-anchor="middle">C2 traffic capture</text>
      <text x="530" y="111" fill="#94a3b8" font-size="9" text-anchor="middle">HTTP/HTTPS flows</text>
      <text x="530" y="125" fill="#94a3b8" font-size="9" text-anchor="middle">DNS resolution log</text>
      <text x="530" y="143" fill="#fb7185" font-size="8" text-anchor="middle">routes 0.0.0.0 proxy</text>

      <!-- Frida Client (backend) -->
      <rect x="90" y="170" width="200" height="115" rx="6" fill="#0f172a"/>
      <rect x="90" y="170" width="200" height="115" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
      <text x="190" y="194" fill="white" font-size="12" font-weight="600" text-anchor="middle">Frida Host Client</text>
      <text x="190" y="214" fill="#94a3b8" font-size="9" text-anchor="middle">Java.perform() hooks</text>
      <text x="190" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">script injection engine</text>
      <text x="190" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">send() callback routing</text>
      <rect x="115" y="260" width="150" height="18" rx="3" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="0.7"/>
      <text x="190" y="273" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="700">Frida 16.7.19</text>

      <!-- Hook Planner (AI/amber) -->
      <rect x="90" y="320" width="200" height="115" rx="6" fill="#0f172a"/>
      <rect x="90" y="320" width="200" height="115" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="190" y="344" fill="white" font-size="12" font-weight="600" text-anchor="middle">Hook Planner LLM</text>
      <text x="190" y="364" fill="#94a3b8" font-size="9" text-anchor="middle">hypothesis → JS hooks</text>
      <text x="190" y="378" fill="#94a3b8" font-size="9" text-anchor="middle">API dictionary lookup</text>
      <text x="190" y="392" fill="#94a3b8" font-size="9" text-anchor="middle">no-hallucination guard</text>
      <rect x="115" y="410" width="150" height="18" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="190" y="423" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">Claude Sonnet 4.6</text>

      <!-- DroidBot (backend) -->
      <rect x="90" y="450" width="200" height="115" rx="6" fill="#0f172a"/>
      <rect x="90" y="450" width="200" height="115" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
      <text x="190" y="474" fill="white" font-size="12" font-weight="600" text-anchor="middle">DroidBot</text>
      <text x="190" y="494" fill="#94a3b8" font-size="9" text-anchor="middle">UI automation driver</text>
      <text x="190" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">activity exploration</text>
      <text x="190" y="522" fill="#94a3b8" font-size="9" text-anchor="middle">screenshot capture</text>
      <rect x="115" y="540" width="150" height="18" rx="3" fill="rgba(100,116,139,0.25)" stroke="#94a3b8" stroke-width="0.7"/>
      <text x="190" y="553" fill="#cbd5e1" font-size="10" text-anchor="middle" font-weight="600">hustvictor/droidbot</text>

      <!-- Android Emulator (security/rose, large center) -->
      <rect x="410" y="220" width="240" height="220" rx="8" fill="#0f172a"/>
      <rect x="410" y="220" width="240" height="220" rx="8" fill="rgba(136,19,55,0.35)" stroke="#fb7185" stroke-width="1.8"/>
      <text x="530" y="245" fill="white" font-size="13" font-weight="600" text-anchor="middle">Android Emulator</text>
      <text x="530" y="260" fill="#fb7185" font-size="9" text-anchor="middle">x86_64 · QEMU · API 30+</text>

      <line x1="425" y1="270" x2="635" y2="270" stroke="#475569" stroke-width="0.5"/>

      <!-- Sub-boxes inside emulator -->
      <rect x="425" y="280" width="210" height="30" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
      <text x="530" y="299" fill="white" font-size="10" text-anchor="middle">Target APK Process</text>

      <rect x="425" y="318" width="210" height="30" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="0.8"/>
      <text x="530" y="337" fill="white" font-size="10" text-anchor="middle">Frida Server 16.7.19</text>

      <rect x="425" y="356" width="210" height="30" rx="4" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="0.8"/>
      <text x="530" y="375" fill="white" font-size="10" text-anchor="middle">ADB Bridge (adb -s serial)</text>

      <rect x="425" y="394" width="210" height="30" rx="4" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="0.8"/>
      <text x="530" y="413" fill="white" font-size="10" text-anchor="middle">System Logs (logcat)</text>

      <!-- Dynamic Worker (backend) -->
      <rect x="790" y="200" width="180" height="90" rx="6" fill="#0f172a"/>
      <rect x="790" y="200" width="180" height="90" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
      <text x="880" y="225" fill="white" font-size="12" font-weight="600" text-anchor="middle">Dynamic Worker</text>
      <text x="880" y="245" fill="#94a3b8" font-size="9" text-anchor="middle">Celery · message bus</text>
      <text x="880" y="259" fill="#94a3b8" font-size="9" text-anchor="middle">observation parser</text>
      <text x="880" y="273" fill="#94a3b8" font-size="9" text-anchor="middle">Hypothesis ↔ Evidence link</text>

      <!-- Observation Store (database) -->
      <rect x="790" y="370" width="180" height="90" rx="6" fill="#0f172a"/>
      <rect x="790" y="370" width="180" height="90" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="880" y="395" fill="white" font-size="12" font-weight="600" text-anchor="middle">Observation Store</text>
      <text x="880" y="415" fill="#94a3b8" font-size="9" text-anchor="middle">PostgreSQL JSONB</text>
      <text x="880" y="429" fill="#94a3b8" font-size="9" text-anchor="middle">hook · network · screenshot</text>
      <text x="880" y="443" fill="#94a3b8" font-size="9" text-anchor="middle">per-hypothesis link</text>

      <!-- MinIO (database) -->
      <rect x="790" y="490" width="180" height="90" rx="6" fill="#0f172a"/>
      <rect x="790" y="490" width="180" height="90" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="880" y="515" fill="white" font-size="12" font-weight="600" text-anchor="middle">MinIO Object Store</text>
      <text x="880" y="535" fill="#94a3b8" font-size="9" text-anchor="middle">APK binary</text>
      <text x="880" y="549" fill="#94a3b8" font-size="9" text-anchor="middle">decompiled code tree</text>
      <text x="880" y="563" fill="#94a3b8" font-size="9" text-anchor="middle">screenshots · flows</text>

      <!-- Launch Resistance Handler (full-width dashed bar) -->
      <rect x="60" y="615" width="1060" height="60" rx="8" fill="#0f172a"/>
      <rect x="60" y="615" width="1060" height="60" rx="8" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="5,3"/>
      <text x="80" y="635" fill="#fb7185" font-size="10" font-weight="600">Launch Resistance Handler</text>
      <text x="80" y="650" fill="#94a3b8" font-size="9">frida.spawn()  →  am start (any activity)  →  am startservice  →  accessibility wake  →  attach(pid) to running process</text>
      <text x="80" y="665" fill="#64748b" font-size="8">Needed because modern banking trojans (Cerberus, Hydra) have no LAUNCHER activity — entry is an AccessibilityService or NotificationListenerService</text>

    </svg>
  </div>
</div>
</body>
</html>
