<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PARALLAX — Full Analysis Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
  .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
  .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
  .diagram-container { background: rgba(15, 23, 42, 0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; }
  svg { width: 100%; display: block; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
  .card { background: rgba(15, 23, 42, 0.5); border-radius: 0.75rem; border: 1px solid #1e293b; padding: 1rem; }
  .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .card-dot { width: 8px; height: 8px; border-radius: 50%; }
  .card h3 { font-size: 0.8rem; font-weight: 600; }
  .card li { color: #94a3b8; font-size: 0.7rem; margin-bottom: 0.25rem; list-style: none; }
  .footer { text-align: center; margin-top: 1rem; color: #475569; font-size: 0.7rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-row">
      <div class="pulse-dot"></div>
      <h1>PARALLAX — Full Analysis Pipeline</h1>
    </div>
    <p class="subtitle">From APK submission to evidence-backed verdict</p>
  </div>
  <div class="diagram-container">
    <svg viewBox="0 0 1180 660" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
        </marker>
        <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
        </marker>
        <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
        </marker>
        <marker id="arr-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>

      <!-- =================== ARROWS FIRST (so they render behind boxes) =================== -->

      <!-- APK → REST API -->
      <line x1="100" y1="155" x2="100" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <!-- REST API → Triage -->
      <line x1="180" y1="230" x2="245" y2="230" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <!-- Triage → Static (full path only; fast-path returns CLEAN without T2-T4) -->
      <line x1="365" y1="230" x2="435" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <!-- Static → Dynamic -->
      <line x1="580" y1="230" x2="640" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <!-- Dynamic → Cortex -->
      <line x1="790" y1="230" x2="850" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <!-- Cortex → Outputs (3 arrows) -->
      <line x1="1000" y1="200" x2="1080" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <line x1="1000" y1="230" x2="1080" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <line x1="1000" y1="260" x2="1080" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
      <!-- TAIG enrichment arrows (dotted, going UP from TAIG to T2, T3, T4) -->
      <line x1="500" y1="430" x2="500" y2="295" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="2,3" marker-end="url(#arr-violet)"/>
      <line x1="700" y1="430" x2="700" y2="295" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="2,3" marker-end="url(#arr-violet)"/>
      <line x1="900" y1="430" x2="900" y2="295" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="2,3" marker-end="url(#arr-violet)"/>
      <text x="510" y="365" fill="#a78bfa" font-size="9">enrich</text>
      <text x="710" y="365" fill="#a78bfa" font-size="9">enrich</text>
      <text x="910" y="365" fill="#a78bfa" font-size="9">enrich</text>

      <!-- =================== COMPONENTS (double-rect masking) =================== -->

      <!-- APK file (external) -->
      <rect x="60" y="100" width="80" height="55" rx="6" fill="#0f172a"/>
      <rect x="60" y="100" width="80" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="100" y="124" fill="white" font-size="11" font-weight="600" text-anchor="middle">APK File</text>
      <text x="100" y="140" fill="#94a3b8" font-size="8" text-anchor="middle">submitted sample</text>

      <!-- REST API (backend) -->
      <rect x="60" y="195" width="80" height="70" rx="6" fill="#0f172a"/>
      <rect x="60" y="195" width="80" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
      <text x="100" y="220" fill="white" font-size="11" font-weight="600" text-anchor="middle">REST API</text>
      <text x="100" y="236" fill="#94a3b8" font-size="8" text-anchor="middle">FastAPI</text>
      <text x="100" y="248" fill="#94a3b8" font-size="8" text-anchor="middle">:8000</text>

      <!-- T1 Triage (backend) -->
      <rect x="245" y="190" width="120" height="105" rx="6" fill="#0f172a"/>
      <rect x="245" y="190" width="120" height="105" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
      <text x="305" y="212" fill="white" font-size="12" font-weight="600" text-anchor="middle">T1 · Triage</text>
      <text x="305" y="232" fill="#94a3b8" font-size="9" text-anchor="middle">manifest scan</text>
      <text x="305" y="245" fill="#94a3b8" font-size="9" text-anchor="middle">permission flags</text>
      <text x="305" y="258" fill="#94a3b8" font-size="9" text-anchor="middle">LLM quick assess</text>
      <rect x="267" y="278" width="76" height="14" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="305" y="288" fill="#fbbf24" font-size="8" text-anchor="middle" font-weight="600">GPT-4o-mini</text>

      <!-- T2 Static (security) -->
      <rect x="435" y="130" width="145" height="145" rx="6" fill="#0f172a"/>
      <rect x="435" y="130" width="145" height="145" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="507" y="152" fill="white" font-size="12" font-weight="600" text-anchor="middle">T2 · Static</text>
      <text x="507" y="172" fill="#94a3b8" font-size="9" text-anchor="middle">jadx decompile</text>
      <text x="507" y="186" fill="#94a3b8" font-size="9" text-anchor="middle">androguard manifest</text>
      <text x="507" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">YARA pattern scan</text>
      <text x="507" y="214" fill="#94a3b8" font-size="9" text-anchor="middle">APKiD packer detect</text>
      <text x="507" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">FlowDroid taint</text>
      <rect x="455" y="252" width="105" height="14" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="507" y="262" fill="#fbbf24" font-size="8" text-anchor="middle" font-weight="600">Code Interpreter</text>

      <!-- T3 Dynamic (security) -->
      <rect x="640" y="130" width="150" height="145" rx="6" fill="#0f172a"/>
      <rect x="640" y="130" width="150" height="145" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="715" y="152" fill="white" font-size="12" font-weight="600" text-anchor="middle">T3 · Dynamic</text>
      <text x="715" y="172" fill="#94a3b8" font-size="9" text-anchor="middle">Android emulator (x86)</text>
      <text x="715" y="186" fill="#94a3b8" font-size="9" text-anchor="middle">Frida 16.7.19 hooks</text>
      <text x="715" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">mitmproxy network</text>
      <text x="715" y="214" fill="#94a3b8" font-size="9" text-anchor="middle">DroidBot UI driver</text>
      <text x="715" y="228" fill="#94a3b8" font-size="9" text-anchor="middle">launch fallback chain</text>
      <rect x="660" y="252" width="110" height="14" rx="3" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="0.7"/>
      <text x="715" y="262" fill="#fb7185" font-size="8" text-anchor="middle" font-weight="600">Frida 16.7.19 hooks</text>

      <!-- T4 Cortex (AI/amber) -->
      <rect x="850" y="155" width="150" height="145" rx="6" fill="#0f172a"/>
      <rect x="850" y="155" width="150" height="145" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="925" y="177" fill="white" font-size="12" font-weight="600" text-anchor="middle">T4 · Cortex</text>
      <text x="925" y="197" fill="#94a3b8" font-size="9" text-anchor="middle">7 parallel agents</text>
      <text x="925" y="211" fill="#94a3b8" font-size="9" text-anchor="middle">evidence synthesis</text>
      <text x="925" y="225" fill="#94a3b8" font-size="9" text-anchor="middle">deterministic scoring</text>
      <text x="925" y="239" fill="#94a3b8" font-size="9" text-anchor="middle">MITRE ATT&CK map</text>
      <text x="925" y="253" fill="#94a3b8" font-size="9" text-anchor="middle">family attribution</text>
      <rect x="870" y="277" width="110" height="14" rx="3" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="925" y="287" fill="#fbbf24" font-size="8" text-anchor="middle" font-weight="600">Multi-Agent AI</text>

      <!-- T5 Delivery outputs (external) -->
      <rect x="1080" y="100" width="90" height="55" rx="6" fill="#0f172a"/>
      <rect x="1080" y="100" width="90" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="1125" y="122" fill="white" font-size="10" font-weight="600" text-anchor="middle">PDF Report</text>
      <text x="1125" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">evidence-first</text>

      <rect x="1080" y="180" width="90" height="55" rx="6" fill="#0f172a"/>
      <rect x="1080" y="180" width="90" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="1125" y="202" fill="white" font-size="10" font-weight="600" text-anchor="middle">STIX 2.1</text>
      <text x="1125" y="218" fill="#94a3b8" font-size="8" text-anchor="middle">structured IOCs</text>

      <rect x="1080" y="260" width="90" height="55" rx="6" fill="#0f172a"/>
      <rect x="1080" y="260" width="90" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="1125" y="282" fill="white" font-size="10" font-weight="600" text-anchor="middle">YARA Rule</text>
      <text x="1125" y="298" fill="#94a3b8" font-size="8" text-anchor="middle">auto-generated</text>

      <text x="1125" y="335" fill="#94a3b8" font-size="8" text-anchor="middle">+ webhook · MISP</text>

      <!-- =================== TAIG cross-cutting bar =================== -->
      <rect x="80" y="430" width="1000" height="90" rx="10" fill="#0f172a"/>
      <rect x="80" y="430" width="1000" height="90" rx="10" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="6,3"/>
      <text x="95" y="450" fill="#a78bfa" font-size="10" font-weight="600">TAIG — Threat Analytics Intelligence Graph</text>
      <text x="95" y="464" fill="#94a3b8" font-size="8">Neo4j (graph) + Qdrant (vectors) — compounds with every analysis</text>

      <!-- Mini-boxes inside TAIG -->
      <rect x="160" y="475" width="120" height="32" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="220" y="490" fill="white" font-size="9" text-anchor="middle">APK nodes</text>
      <text x="220" y="502" fill="#94a3b8" font-size="7" text-anchor="middle">per sample, SHA-keyed</text>

      <rect x="320" y="475" width="120" height="32" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="380" y="490" fill="white" font-size="9" text-anchor="middle">IOC links</text>
      <text x="380" y="502" fill="#94a3b8" font-size="7" text-anchor="middle">domains · IPs · certs</text>

      <rect x="480" y="475" width="120" height="32" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="540" y="490" fill="white" font-size="9" text-anchor="middle">Family clusters</text>
      <text x="540" y="502" fill="#94a3b8" font-size="7" text-anchor="middle">campaign detection</text>

      <rect x="640" y="475" width="120" height="32" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="700" y="490" fill="white" font-size="9" text-anchor="middle">ATT&CK map</text>
      <text x="700" y="502" fill="#94a3b8" font-size="7" text-anchor="middle">technique counts</text>

      <rect x="800" y="475" width="120" height="32" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="860" y="490" fill="white" font-size="9" text-anchor="middle">Pattern memory</text>
      <text x="860" y="502" fill="#94a3b8" font-size="7" text-anchor="middle">fraud flows · idioms</text>

      <!-- =================== LEGEND =================== -->
      <rect x="80" y="555" width="1000" height="80" rx="6" fill="rgba(15,23,42,0.5)" stroke="#1e293b" stroke-width="0.8"/>
      <text x="100" y="575" fill="white" font-size="10" font-weight="600">Legend</text>

      <rect x="100" y="588" width="14" height="9" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
      <text x="120" y="596" fill="#94a3b8" font-size="8">Input / Output</text>

      <rect x="240" y="588" width="14" height="9" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
      <text x="260" y="596" fill="#94a3b8" font-size="8">Backend / Service</text>

      <rect x="400" y="588" width="14" height="9" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
      <text x="420" y="596" fill="#94a3b8" font-size="8">Analysis / Security</text>

      <rect x="560" y="588" width="14" height="9" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="580" y="596" fill="#94a3b8" font-size="8">AI / LLM agent</text>

      <rect x="700" y="588" width="14" height="9" rx="2" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
      <text x="720" y="596" fill="#94a3b8" font-size="8">Knowledge / Graph</text>

      <line x1="830" y1="592" x2="848" y2="592" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="2,3"/>
      <text x="855" y="595" fill="#94a3b8" font-size="8">enrichment (read)</text>

      <line x1="980" y1="592" x2="998" y2="592" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr-gray)"/>
      <text x="1005" y="595" fill="#94a3b8" font-size="8">pipeline flow</text>

      <text x="100" y="618" fill="#64748b" font-size="7">Solid arrows = primary pipeline flow. Dotted violet = TAIG enrichment reads. Triage fast-path returns CLEAN verdicts without invoking T2-T4.</text>
    </svg>
  </div>
</div>
</body>
</html>
