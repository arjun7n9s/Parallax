<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#ffffff;}
  .diagram-container{width:1280px;height:720px;background:#ffffff;}
  text{font-family:'Inter',-apple-system,Segoe UI,Helvetica,Arial,sans-serif;}
</style>
</head>
<body>
<div class="diagram-container">
<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1C3A5E" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- edges (drawn first) -->
  <g stroke="#C2CDD5" stroke-width="2">
    <line x1="640" y1="360" x2="230" y2="160"/>
    <line x1="640" y1="360" x2="230" y2="360"/>
    <line x1="640" y1="360" x2="230" y2="560"/>
    <line x1="640" y1="360" x2="1050" y2="160"/>
    <line x1="640" y1="360" x2="1050" y2="360"/>
    <line x1="640" y1="360" x2="1050" y2="560"/>
  </g>

  <!-- edge labels -->
  <g>
    <g><rect x="372" y="244" width="132" height="22" rx="6" fill="#ffffff"/><text x="438" y="260" font-size="12.5" font-weight="600" fill="#7C8893" text-anchor="middle">REQUESTS</text></g>
    <g><rect x="402" y="349" width="170" height="22" rx="6" fill="#ffffff"/><text x="487" y="365" font-size="12.5" font-weight="600" fill="#7C8893" text-anchor="middle">COMMUNICATES_WITH</text></g>
    <g><rect x="382" y="454" width="116" height="22" rx="6" fill="#ffffff"/><text x="440" y="470" font-size="12.5" font-weight="600" fill="#7C8893" text-anchor="middle">EXHIBITS</text></g>
    <g><rect x="778" y="244" width="150" height="22" rx="6" fill="#ffffff"/><text x="853" y="260" font-size="12.5" font-weight="600" fill="#7C8893" text-anchor="middle">ATTRIBUTED_TO</text></g>
    <g><rect x="806" y="349" width="96" height="22" rx="6" fill="#ffffff"/><text x="854" y="365" font-size="12.5" font-weight="600" fill="#7C8893" text-anchor="middle">PART_OF</text></g>
    <g><rect x="800" y="454" width="104" height="22" rx="6" fill="#ffffff"/><text x="852" y="470" font-size="12.5" font-weight="600" fill="#7C8893" text-anchor="middle">MATCHES</text></g>
  </g>

  <!-- central hub -->
  <circle cx="640" cy="360" r="66" fill="#1C3A5E" filter="url(#sh2)"/>
  <text x="640" y="356" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">APK</text>
  <text x="640" y="382" font-size="12" font-weight="500" fill="#9FB4CC" text-anchor="middle">SHA-256</text>

  <!-- left nodes (teal) -->
  <g>
    <rect x="80" y="128" width="300" height="64" rx="13" fill="#0E7C86" filter="url(#sh2)"/>
    <text x="230" y="166" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Permission</text>
  </g>
  <g>
    <rect x="80" y="328" width="300" height="64" rx="13" fill="#0E7C86" filter="url(#sh2)"/>
    <text x="230" y="366" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Domain / IP / URL</text>
  </g>
  <g>
    <rect x="80" y="528" width="300" height="64" rx="13" fill="#0E7C86" filter="url(#sh2)"/>
    <text x="230" y="566" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">ATT&amp;CK Technique</text>
  </g>

  <!-- right nodes (gold) -->
  <g>
    <rect x="900" y="128" width="300" height="64" rx="13" fill="#B07A18" filter="url(#sh2)"/>
    <text x="1050" y="166" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Family</text>
  </g>
  <g>
    <rect x="900" y="328" width="300" height="64" rx="13" fill="#B07A18" filter="url(#sh2)"/>
    <text x="1050" y="366" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Campaign</text>
  </g>
  <g>
    <rect x="900" y="528" width="300" height="64" rx="13" fill="#B07A18" filter="url(#sh2)"/>
    <text x="1050" y="566" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Pattern</text>
  </g>

  <text x="640" y="664" font-size="14" font-weight="600" fill="#0E5C64" text-anchor="middle">Neo4j relationships + Qdrant semantic vectors</text>
  <text x="640" y="690" font-size="13" font-style="italic" fill="#8A96A0" text-anchor="middle">All writes use MERGE semantics, so re-analysis updates the graph rather than duplicating it.</text>
</svg>
</div>
</body>
</html>
